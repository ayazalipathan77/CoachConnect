# Render Blueprint for CoachConnect
# Deploy: Render Dashboard → New → Blueprint → pick this repo (branch: main).
# Provisions a managed Postgres 16 + a Node web service running Next.js.
# Migrations run BEFORE `next build` (some pages query tables that must
# already exist at build time), then the app builds, then idempotent seeds
# run (free plan has no preDeploy step). AUTH_SECRET is auto-generated;
# integrations default to mock.
#
# No cron job here: Render's Cron Job service type doesn't offer a free
# plan. The /api/cron/reminders route (guarded by CRON_SECRET) still exists
# in the app — point any free external scheduler (e.g. cron-job.org,
# GitHub Actions on a schedule) at it if you want session reminders without
# upgrading to a paid Render plan.

databases:
  - name: coachconnect-db
    databaseName: coachconnect
    user: coachconnect
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: coachconnect
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm db:migrate && pnpm build && pnpm db:deploy
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "20.20.0"
      - key: DATABASE_URL
        fromDatabase:
          name: coachconnect-db
          # External, not internal: the build phase runs in an isolated
          # builder with no access to Render's private network, so
          # `connectionString` (internal hostname) fails DNS resolution
          # during `pnpm db:migrate` in buildCommand. The external URL
          # works from both the build environment and at runtime.
          property: externalConnectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: INTEGRATION_EMAIL
        value: mock
      - key: INTEGRATION_PUSH
        value: mock
      - key: INTEGRATION_MAPS
        value: mock
      - key: INTEGRATION_PAYMENTS
        value: mock
      - key: PLATFORM_COMMISSION_RATE
        value: "0.15"
      - key: PLATFORM_MIN_FEE_MINOR
        value: "500"
      - key: PLATFORM_CURRENCY
        value: GBP
      - key: CRON_SECRET
        generateValue: true
