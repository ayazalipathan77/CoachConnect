# Render Blueprint for CoachConnect
# Deploy: Render Dashboard → New → Blueprint → pick this repo (branch: main).
# Provisions a managed Postgres 16 + a Node web service running Next.js.
# Migrations and idempotent seeds run during the build (free plan has no
# preDeploy step). AUTH_SECRET is auto-generated; integrations default to mock.

databases:
  - name: coachconnect-db
    databaseName: coachconnect
    user: coachconnect
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: coachconnect
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    healthCheckPath: /
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm db:deploy
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "20.20.0"
      - key: DATABASE_URL
        fromDatabase:
          name: coachconnect-db
          property: internalConnectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: INTEGRATION_EMAIL
        value: mock
      - key: INTEGRATION_PUSH
        value: mock
      - key: INTEGRATION_MAPS
        value: mock
      - key: INTEGRATION_PAYMENTS
        value: mock
      - key: PLATFORM_COMMISSION_RATE
        value: "0.15"
      - key: PLATFORM_MIN_FEE_MINOR
        value: "500"
      - key: PLATFORM_CURRENCY
        value: GBP
